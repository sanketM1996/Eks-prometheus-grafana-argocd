apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: three-tier
  labels:
    role: backend
    env: demo

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%

  selector:
    matchLabels:
      role: backend

  template:
    metadata:
      labels:
        role: backend

    spec:
      containers:
      - name: todo-backend
        image: sanketmahajan/todo-backend:v1
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: todo-backend-config
        - secretRef:
            name: todo-mysql-secret

        ports:
        - containerPort: 8080

        # 🔥 ADD THIS (MOST IMPORTANT FIX)
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"